site_name: MusicApps Knowledge Base
site_url: https://kb.musicapps.eu
site_description: Technical reference for the MusicApps / SessionClick project
site_author: Karl-Ernst Kiel

repo_url: https://github.com/musicapps-kek/musicapps-kb
repo_name: musicapps-kek/musicapps-kb

theme:
  name: zensical
  language: en
  palette:
    - scheme: default
      primary: deep purple
      accent: deep purple
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: deep purple
      accent: deep purple
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true

extra_javascript:
  - https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js
  - javascripts/mermaid-init.js

nav:
  - Home: index.md
  - Kotlin Multiplatform:
      - What is KMP?: kmp/what-is-kmp.md
      - Gradle in a KMP Project: kmp/gradle-in-kmp.md
      - How Kotlin and iOS Work Together: kmp/kotlin-and-ios.md
  - Android & iOS:
      - Android vs iOS — Concepts & Terminology: android/android-vs-ios-concepts.md
      - Oboe Audio Framework: android/oboe-audio-framework.md
      - SessionClick App Architecture: android/sessionclick-architecture.md
      - Session Repository & Persistence: android/session-repository.md
      - Android Testing: android/android-testing.md
  - Tools:
      - Overview: tools/index.md
      - AI-Assisted Development Workflow: tools/ai-workflow.md
